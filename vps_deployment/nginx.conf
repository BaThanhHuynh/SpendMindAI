# ==========================================================================
# CẤU HÌNH NGINX VIRTUAL HOST MẪU CHO QUẢN LÝ CHI TIÊU
# Đường dẫn lưu trên VPS Ubuntu: /etc/nginx/sites-available/quanlychitieu
# ==========================================================================

server {
    listen 80;
    listen [::]:80;
    
    # Thay đổi 'huynhbathanh.site' thành tên miền thực tế của bạn
    server_name huynhbathanh.site www.huynhbathanh.site;

    # Thư mục gốc chứa mã nguồn dự án trên VPS
    root /var/www/QuanLyChiTieu;
    
    # Thứ tự ưu tiên tệp tin chạy mặc định
    index index.html index.php;

    charset utf-8;

    # Cấu hình log lỗi và log truy cập
    access_log /var/log/nginx/quanlychitieu.access.log;
    error_log /var/log/nginx/quanlychitieu.error.log;

    # Bảo mật: Thêm tiêu đề HTTP Security Headers tốt nhất cho sản phẩm
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Xử lý các yêu cầu cho Front-end (HTML tĩnh)
    location / {
        try_files $uri $uri/ =404;
    }

    # Cấu hình xử lý tệp PHP thông qua PHP-FPM socket
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # Đảm bảo đường dẫn socket trùng khớp với phiên bản PHP bạn cài đặt trên VPS (Ví dụ: PHP 8.2)
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bảo mật: Chặn truy cập vào các tệp ẩn bắt đầu bằng dấu chấm (như .git, .htaccess, .env)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Tối ưu hóa: Bật cache trình duyệt cho hình ảnh và font
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }

    # Không cache CSS và JS để luôn tải phiên bản mới nhất
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
}
